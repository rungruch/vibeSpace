name: Sync to Public Branch

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main to public branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or update the public branch from main.
          # NOTE: Do not push directly to the public branch – it is managed
          # exclusively by this workflow to avoid diverging histories.
          git checkout -B public
          git push origin public --force
